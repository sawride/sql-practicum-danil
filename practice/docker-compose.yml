services:
  postgres:
    image: postgres:17.10
    container_name: psql_payments_container
    ports:
      - "7778:5432"
      - "5455:5432"
    volumes:
      - ./volumes/postgres/data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=payment_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=1234
    healthcheck:
      test: pg_isready -q -d $$POSTGRES_DB -U $$POSTGRES_USER
      timeout: 5s
      interval: 3s
      retries: 8
